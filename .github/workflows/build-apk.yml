name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Inicializar Gradle wrapper
        run: gradle wrapper --gradle-version=8.5

      - name: Aceptar licencias Android
        run: |
          mkdir -p ~/.android
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Instalar Android SDK
        run: |
          # Crear SDK root
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd /tmp
          curl -sLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            "platforms;android-34" \
            "build-tools;34.0.0" 2>&1 | tail -5
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build APK
        run: ./gradlew assembleDebug
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroDroidLite-APK
          path: app/build/outputs/apk/debug/*.apk
